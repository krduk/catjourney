    <title>Cat Journey - Perfect Map Alignment & Visuals</title>

        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />

    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: #eee;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
        }

        #game-container {
            position: relative;
            width: 800px;
            max-width: 100%;
            border: 4px solid #fff;
            image-rendering: pixelated;
        }

        canvas {
            display: block;
            width: 100%;
            background-color: #000;
        }

        #map-container {
            position: relative;
            width: 800px;
            height: 250px;
            max-width: 100%;
            margin-top: 15px;
            border: 2px solid #555;
            background-color: #000;
            overflow: hidden;
            z-index: 1;
        }

        /* 地図の背景色を反転後の海の色に合わせる */
        #world-map {
            width: 100%;
            height: 100%;
            background-color: #1a2026;
        }

        /* ★魔法のフィルター: 白マップを反転させて、美しいダークブルーの海と漆黒の陸地を作る */
        .leaflet-layer {
            filter: invert(100%) hue-rotate(180deg) contrast(1.2) brightness(1.1);
        }

        .leaflet-control-attribution {
            display: none;
        }

        #ui {
            margin-top: 15px;
            text-align: center;
            width: 800px;
            max-width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }

        #target-display,
        #time-display {
            font-size: 14px;
            margin: 0;
            letter-spacing: 1px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        #target-display {
            font-weight: bold;
            color: #ffeb3b;
        }

        .controls-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            background: #222;
            padding: 10px 20px;
            border-radius: 8px;
            border: 1px solid #444;
            width: calc(100% - 40px);
            max-width: 760px;
        }

        input[type="range"]#speed-slider {
            flex-grow: 1;
            cursor: pointer;
            max-width: 300px;
        }

        button {
            background-color: #fff;
            color: #000;
            border: none;
            padding: 6px 15px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            border-radius: 4px;
        }

        button:hover {
            background-color: #ccc;
        }

        #gmap-btn {
            background-color: #4285F4;
            color: white;
            display: flex;
            align-items: center;
            gap: 5px;
            margin-left: auto;
        }

        #gmap-btn:hover {
            background-color: #3367D6;
        }
    </style>
</head>

        // =========================================================================
        // 完璧な海陸判定システム (白ベース地図の青色成分をチェック)
        // =========================================================================
        const tileCache = {};
        const offCanvas = document.createElement('canvas');
        offCanvas.width = 1; offCanvas.height = 1;
        const offCtx = offCanvas.getContext('2d', { willReadFrequently: true });
        let lastKnownSeaState = false;

        function getSeaStateRealtime(lat, lng) {
            const zoom = 5;
            const n = Math.pow(2, zoom);
            let x = (lng + 180) / 360 * n;
            let latRad = lat * Math.PI / 180;
            let y = (1 - Math.log(Math.tan(latRad) + 1 / Math.cos(latRad)) / Math.PI) / 2 * n;

            x = x % n; if (x < 0) x += n;

            let tileX = Math.floor(x);
            let tileY = Math.floor(y);
            if (tileY < 0) tileY = 0; if (tileY >= n) tileY = n - 1;

            const pixelX = Math.floor((x - tileX) * 256);
            const pixelY = Math.floor((y - tileY) * 256);
            const tileKey = `${zoom}_${tileX}_${tileY}`;

            if (tileCache[tileKey]) {
                if (tileCache[tileKey].loaded && tileCache[tileKey].img) {
                    offCtx.clearRect(0, 0, 1, 1);
                    offCtx.drawImage(tileCache[tileKey].img, -pixelX, -pixelY);
                    const data = offCtx.getImageData(0, 0, 1, 1).data;
                    const r = data[0], g = data[1], b = data[2];

                    // Lightマップの特徴: 陸は赤(R)が強く、海は青(B)が強い
                    // BがRより明らかに大きければ「海」と確信を持って判定
                    lastKnownSeaState = (b > r + 2);
                }
            } else {
                tileCache[tileKey] = { loaded: false, img: null };
                const img = new Image();
                img.crossOrigin = "Anonymous";
                const sub = ['a', 'b', 'c', 'd'][Math.floor(Math.random() * 4)];
                img.src = `https://${sub}.basemaps.cartocdn.com/light_nolabels/${zoom}/${tileX}/${tileY}.png`;
                img.onload = () => { tileCache[tileKey].img = img; tileCache[tileKey].loaded = true; };
                img.onerror = () => { tileCache[tileKey].loaded = true; };
            }
            return lastKnownSeaState;
        }

            [69.2, "Valparaiso Funicular", "great_wall", false, 0.301, 0.683, false, "urban_amer"],
            [69.7, "Juan Fernandez Islands", "alps", true, 0.281, 0.686, true, "sea_island"],
            [70.2, "Pitcairn Islands", "uluru", true, 0.138, 0.638, true, "sea_island"],
            [70.7, "French Polynesia", "moai", true, 0.085, 0.597, true, "sea_island"],
            [71.2, "Bora Bora Mt Otemanu", "fuji", true, 0.078, 0.591, true, "sea_island"],
            [71.7, "Tonga Trench", "moai", true, 0.013, 0.611, true, "sea_island"]
        ];

        let landmarks = landmarksDataRaw.map((l, index) => {
            let lng = (l[4] * 360) - 180;
            let lat = 90 - (l[5] * 180);
            return { id: index, name: l[1], type: l[2], onWater: l[3], lat: lat, lng: lng, bgType: l[7] };
        });

        const TOTAL_WORLD_TIME = 86400;
        const BASE_SCROLL_SPEED = 40;

        let gameState = {
            currentLandmarkIndex: 0,
            nextLandmarkIndex: Math.floor(Math.random() * (landmarks.length - 1)) + 1,
            mapProgress: 0,
            currentLat: landmarks[0].lat,
            currentLng: landmarks[0].lng,
            visualScrollX: 0,
            departureVisualX: 0,
            arrivalVisualX: null,
            state: 'waiting',
            waitTimer: 2.0,

            currentSeaState: false,
            upcomingSeaState: false,
            currentBgType: landmarks[0].bgType,
            upcomingBgType: landmarks[0].bgType,
            boundaryVisualX: null
        };

        function getSpeedMultiplier() {
            let val = speedSlider.value;
            if (val == 0) return 1.0;
            return Math.pow(100000, val / 100);
        }

        speedSlider.addEventListener('input', () => {
            let mult = getSpeedMultiplier();
            let label = mult >= 1000 ? (mult / 1000).toFixed(1) + 'k x' : mult.toFixed(1) + 'x';
            speedDisplay.textContent = label;
        });

        gmapBtn.addEventListener('click', () => {
            const url = `https://www.google.com/maps/search/?api=1&query=${gameState.currentLat},${gameState.currentLng}`;
            window.location.href = url;
        });

        function drawSprite(spriteArr, x, y, size = 2) {
            ctx.fillStyle = "#fff";
            for (let row = 0; row < spriteArr.length; row++) {
                for (let col = 0; col < spriteArr[row].length; col++) {
                    if (spriteArr[row][col] === '#') {
                        ctx.fillRect(x + col * size, y + row * size, size, size);
                    }
                }
            }
        }

        function drawSky(dayProgress, visualX) {
            ctx.fillStyle = "#000"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            if (dayProgress < 0.25 || dayProgress > 0.75) {
                ctx.fillStyle = "#fff";
                for (let i = 0; i < 40; i++) {
                    let sx = ((Math.floor(i * 123 - visualX * 0.1) % canvas.width) + canvas.width) % canvas.width;
                    let sy = (i * 37) % (canvas.height / 2.5);
                    ctx.fillRect(sx, sy, 1, 1);
                }
            }
            let sunY = 200, moonY = 200, sunX = 0, moonX = 0;
            if (dayProgress >= 0.2 && dayProgress <= 0.8) {
                let p = (dayProgress - 0.2) / 0.6;
                sunX = canvas.width - (p * canvas.width); sunY = 110 - Math.sin(p * Math.PI) * 80;
            } else {
                let p = dayProgress < 0.2 ? (dayProgress + 0.2) / 0.4 : (dayProgress - 0.8) / 0.4;
                moonX = canvas.width - (p * canvas.width); moonY = 110 - Math.sin(p * Math.PI) * 80;
            }
            ctx.fillStyle = "#fff";
            if (sunY < 180) { ctx.beginPath(); ctx.arc(sunX, sunY, 10, 0, Math.PI * 2); ctx.fill(); }
            if (moonY < 180) { ctx.beginPath(); ctx.arc(moonX, moonY, 8, 0, Math.PI * 2); ctx.fill(); ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(moonX - 3, moonY - 2, 7, 0, Math.PI * 2); ctx.fill(); }
        }

        function drawEnvironment(visualX, boundaryScreenX, currentSea, upcomingSea, currentBg, upcomingBg) {
            ctx.fillStyle = "#fff"; ctx.strokeStyle = "#fff"; ctx.lineWidth = 1;

            ctx.beginPath();
            for (let x = 0; x < canvas.width; x += 2) {
                let isSea = (boundaryScreenX != null && x >= boundaryScreenX) ? upcomingSea : currentSea;
                let y = groundY;
                if (isSea) {
                    y = groundY + 3 + Math.sin(x * 0.05 + visualX * 0.02) * 3;
                }
                if (x === 0) ctx.moveTo(x, y);
                else ctx.lineTo(x, y);
            }
            ctx.stroke();

            if (boundaryScreenX != null && boundaryScreenX > -40 && boundaryScreenX < canvas.width + 40) {
                if (currentSea !== upcomingSea) {
                    ctx.fillStyle = "#fff";
                    for (let i = 0; i < 30; i++) {
                        ctx.fillRect(boundaryScreenX - 20 + Math.random() * 40, groundY + Math.random() * 15, 1, 1);
                    }
                    ctx.fillRect(boundaryScreenX - 15, groundY, 30, 2);
                    ctx.fillRect(boundaryScreenX - 10, groundY + 2, 2, 8);
                    ctx.fillRect(boundaryScreenX + 8, groundY + 2, 2, 8);
                } else {
                    ctx.fillRect(boundaryScreenX, groundY - 15, 2, 15);
                    ctx.beginPath(); ctx.arc(boundaryScreenX + 1, groundY - 15, 6, 0, Math.PI * 2); ctx.fill();
                }
            }

            let leftW = visualX - catX, rightW = leftW + canvas.width;
            for (let wx = Math.floor((leftW - 40) / 40) * 40; wx <= rightW + 40; wx += 40) {
                let screenX = wx - visualX + catX;
                let isSea = (boundaryScreenX != null && screenX >= boundaryScreenX) ? upcomingSea : currentSea;
                let bgType = (boundaryScreenX != null && screenX >= boundaryScreenX) ? upcomingBg : currentBg;

                let seed = Math.sin(wx) * 10000, rand = seed - Math.floor(seed);
                if (rand > 0.45) {
                    if (isSea) {
                        if (rand > 0.7) { ctx.beginPath(); ctx.arc(screenX, groundY + 8, 3, Math.PI, 0); ctx.stroke(); }
                    } else {
                        switch (bgType) {
                            case "urban_asia": case "urban_amer": case "urban_euro":
                                if (rand > 0.6) { ctx.fillRect(screenX, groundY - 30, 8, 30); ctx.fillStyle = "#000"; ctx.fillRect(screenX + 2, groundY - 25, 4, 1); ctx.fillStyle = "#fff"; }
                                else { ctx.fillRect(screenX + 5, groundY - 15, 1, 15); ctx.beginPath(); ctx.arc(screenX + 5, groundY - 17, 2, 0, Math.PI * 2); ctx.fill(); } break;
                            case "desert":
                                if (rand > 0.6) { ctx.beginPath(); ctx.moveTo(screenX, groundY); ctx.lineTo(screenX + 15, groundY - 15); ctx.lineTo(screenX + 30, groundY); ctx.closePath(); ctx.stroke(); }
                                else { ctx.beginPath(); ctx.arc(screenX + 15, groundY, 15, Math.PI, 0); ctx.stroke(); } break;
                            case "antarctic":
                                if (rand > 0.7) { ctx.beginPath(); ctx.arc(screenX + 5, groundY, 5, Math.PI, 0); ctx.stroke(); }
                                else { ctx.fillRect(screenX, groundY - 6, 4, 6); } break;
                            default:
                                if (rand > 0.6) { ctx.fillRect(screenX + 4, groundY - 12, 2, 12); ctx.beginPath(); ctx.moveTo(screenX + 5, groundY - 14); ctx.lineTo(screenX + 1, groundY - 10); ctx.lineTo(screenX + 9, groundY - 10); ctx.fill(); }
                                else { ctx.fillRect(screenX + 2, groundY - 6, 8, 6); } break;
                        }
                    }
                }
            }
        }

        function drawLandmarks(visualX, activeLandmarks) {
            activeLandmarks.forEach(l => {
                let screenX = (l.targetVisualX - visualX) + catX;

                if (screenX >= -150 && screenX <= 350) {
                    ctx.strokeStyle = "#fff"; ctx.fillStyle = "#fff"; ctx.lineWidth = 2;
                    let y = l.onWater ? groundY + 3 : groundY;
                    switch (l.type) {
                        case "skytree": ctx.fillRect(screenX + 10, y - 60, 2, 60); ctx.fillRect(screenX + 6, y - 10, 10, 10); ctx.fillRect(screenX + 8, y - 40, 6, 4); ctx.fillRect(screenX + 9, y - 50, 4, 3); break;
                        case "fuji": ctx.beginPath(); ctx.moveTo(screenX, y); ctx.lineTo(screenX + 35, y - 45); ctx.lineTo(screenX + 55, y - 45); ctx.lineTo(screenX + 90, y); ctx.stroke(); ctx.fillRect(screenX + 100, y - 14, 2, 14); ctx.fillRect(screenX + 112, y - 14, 2, 14); ctx.fillRect(screenX + 96, y - 14, 20, 3); ctx.fillRect(screenX + 100, y - 10, 14, 2); break;
                        case "taipei": ctx.fillRect(screenX + 10, y - 50, 4, 10); ctx.fillRect(screenX + 8, y - 40, 8, 8); ctx.fillRect(screenX + 8, y - 30, 8, 8); ctx.fillRect(screenX + 8, y - 20, 8, 8); ctx.fillRect(screenX + 6, y - 10, 12, 10); break;
                        case "great_wall": ctx.beginPath(); ctx.moveTo(screenX, y - 8); ctx.lineTo(screenX + 30, y - 12); ctx.lineTo(screenX + 30, y - 25); ctx.lineTo(screenX + 50, y - 25); ctx.lineTo(screenX + 50, y - 12); ctx.lineTo(screenX + 90, y - 8); ctx.stroke(); for (let i = 0; i < 90; i += 10) ctx.fillRect(screenX + i, y - 10, 5, 2); break;
                        case "petronas": ctx.fillRect(screenX + 5, y - 55, 4, 55); ctx.fillRect(screenX + 15, y - 55, 4, 55); ctx.fillRect(screenX + 5, y - 35, 14, 2); break;
                        case "angkor_wat": for (let i = 0; i < 3; i++) { ctx.fillRect(screenX + i * 20, y - 15, 12, 15); ctx.beginPath(); ctx.arc(screenX + 6 + i * 20, y - 15, 6, Math.PI, 0); ctx.fill(); } break;
                        case "opera_house": ctx.beginPath(); ctx.arc(screenX + 15, y, 15, Math.PI, Math.PI * 1.6); ctx.arc(screenX + 32, y, 20, Math.PI, Math.PI * 1.5); ctx.arc(screenX + 48, y, 12, Math.PI, Math.PI * 1.7); ctx.stroke(); break;
                        case "taj_mahal": ctx.fillRect(screenX + 15, y - 16, 40, 16); ctx.beginPath(); ctx.arc(screenX + 35, y - 16, 10, Math.PI, 0); ctx.fill(); ctx.fillRect(screenX + 8, y - 26, 3, 26); ctx.fillRect(screenX + 59, y - 26, 3, 26); break;
                        case "burj": ctx.fillRect(screenX + 10, y - 70, 2, 70); ctx.fillRect(screenX + 8, y - 40, 6, 40); ctx.fillRect(screenX + 4, y - 20, 14, 20); break;
                        case "petra": ctx.fillRect(screenX, y - 40, 50, 40); ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(screenX + 25, y - 10, 8, Math.PI, 0); ctx.fill(); ctx.fillRect(screenX + 15, y - 45, 20, 15); break;
                        case "pyramid": ctx.beginPath(); ctx.moveTo(screenX, y); ctx.lineTo(screenX + 40, y - 40); ctx.lineTo(screenX + 80, y); ctx.closePath(); ctx.stroke(); ctx.fillRect(screenX + 90, y - 12, 20, 12); ctx.fillRect(screenX + 102, y - 20, 8, 8); break;
                        case "djenne_mosque": ctx.fillRect(screenX, y - 30, 60, 30); ctx.fillStyle = "#000"; for (let i = 5; i < 60; i += 10) ctx.fillRect(screenX + i, y - 25, 3, 20); ctx.fillStyle = "#fff"; for (let i = 0; i < 3; i++) ctx.fillRect(screenX + i * 25, y - 40, 8, 40); break;
                        case "colosseum": ctx.fillRect(screenX, y - 20, 40, 20); ctx.fillStyle = "#000"; for (let i = 4; i < 38; i += 8) { ctx.fillRect(screenX + i, y - 15, 4, 6); ctx.fillRect(screenX + i, y - 6, 4, 6); } break;
                        case "parthenon": ctx.fillRect(screenX, y - 3, 70, 3); ctx.fillRect(screenX + 4, y - 24, 62, 3); ctx.beginPath(); ctx.moveTo(screenX + 2, y - 24); ctx.lineTo(screenX + 35, y - 34); ctx.lineTo(screenX + 68, y - 24); ctx.closePath(); ctx.stroke(); for (let i = 6; i < 65; i += 10) ctx.fillRect(screenX + i, y - 21, 3, 18); break;
                        case "pisa": ctx.save(); ctx.translate(screenX + 20, y); ctx.rotate(-0.13); ctx.fillRect(-10, -45, 20, 45); ctx.fillStyle = "#000"; for (let h = -8; h > -45; h -= 7) ctx.fillRect(-10, h, 20, 1); ctx.restore(); break;
                        case "alps": ctx.beginPath(); ctx.moveTo(screenX, y); ctx.lineTo(screenX + 15, y - 40); ctx.lineTo(screenX + 25, y - 20); ctx.lineTo(screenX + 40, y - 50); ctx.lineTo(screenX + 60, y); ctx.stroke(); break;
                        case "sagrada": for (let i = 0; i < 4; i++) { ctx.fillRect(screenX + i * 10, y - 10 - i * 8, 8, 10 + i * 8); ctx.beginPath(); ctx.moveTo(screenX + i * 10, y - 10 - i * 8); ctx.lineTo(screenX + i * 10 + 4, y - 10 - i * 8 - 12); ctx.lineTo(screenX + i * 10 + 8, y - 10 - i * 8); ctx.fill(); } break;
                        case "eiffel": ctx.beginPath(); ctx.moveTo(screenX, y); ctx.lineTo(screenX + 12, y - 25); ctx.lineTo(screenX + 12, y - 65); ctx.lineTo(screenX + 16, y - 65); ctx.lineTo(screenX + 16, y - 25); ctx.lineTo(screenX + 28, y); ctx.stroke(); ctx.fillRect(screenX + 45, y - 24, 26, 24); ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(screenX + 58, y, 8, Math.PI, 0); ctx.fill(); break;
                        case "neuschwanstein": ctx.fillRect(screenX, y - 25, 30, 25); ctx.fillRect(screenX + 5, y - 45, 10, 20); ctx.fillRect(screenX + 25, y - 55, 8, 30); ctx.beginPath(); ctx.arc(screenX + 29, y - 55, 6, Math.PI, 0); ctx.fill(); break;
                        case "big_ben": ctx.fillRect(screenX, y - 55, 14, 55); ctx.beginPath(); ctx.moveTo(screenX, y - 55); ctx.lineTo(screenX + 7, y - 68); ctx.lineTo(screenX + 14, y - 55); ctx.closePath(); ctx.stroke(); ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(screenX + 7, y - 46, 3, 0, Math.PI * 2); ctx.fill(); break;
                        case "christ": ctx.fillRect(screenX + 15, y - 40, 10, 40); ctx.fillRect(screenX + 5, y - 35, 30, 6); break;
                        case "cn_tower": ctx.fillRect(screenX + 10, y - 65, 2, 65); ctx.fillRect(screenX + 8, y - 45, 6, 10); ctx.fillRect(screenX + 6, y - 15, 10, 15); break;
                        case "liberty": ctx.fillRect(screenX, y - 10, 16, 10); ctx.fillRect(screenX + 4, y - 40, 8, 30); ctx.fillRect(screenX + 10, y - 48, 3, 12); ctx.fillRect(screenX + 9, y - 51, 5, 3); break;
                        case "chichen": ctx.fillRect(screenX + 10, y - 25, 20, 5); ctx.fillRect(screenX + 5, y - 20, 30, 10); ctx.fillRect(screenX, y - 10, 40, 10); ctx.fillStyle = "#000"; ctx.fillRect(screenX + 16, y - 25, 8, 25); break;
                        case "golden_gate": ctx.fillRect(screenX, y - 50, 10, 50); ctx.fillRect(screenX + 80, y - 50, 10, 50); ctx.fillRect(screenX, y - 40, 90, 3); ctx.beginPath(); ctx.moveTo(screenX + 5, y - 47); ctx.quadraticCurveTo(screenX + 45, y - 20, screenX + 85, y - 47); ctx.stroke(); break;
                        case "moai": ctx.beginPath(); ctx.moveTo(screenX, y); ctx.lineTo(screenX, y - 30); ctx.lineTo(screenX + 10, y - 30); ctx.lineTo(screenX + 10, y - 22); ctx.lineTo(screenX + 15, y - 20); ctx.lineTo(screenX + 10, y - 18); ctx.lineTo(screenX + 12, y - 14); ctx.lineTo(screenX + 8, y); ctx.closePath(); ctx.fill(); break;
                        case "st_basil": ctx.fillRect(screenX + 15, y - 40, 30, 40); ctx.beginPath(); ctx.arc(screenX + 30, y - 40, 15, 0, Math.PI, true); ctx.fill(); ctx.fillRect(screenX, y - 25, 15, 25); ctx.beginPath(); ctx.arc(screenX + 7.5, y - 25, 10, 0, Math.PI, true); ctx.fill(); ctx.fillRect(screenX + 45, y - 25, 15, 25); ctx.beginPath(); ctx.arc(screenX + 52.5, y - 25, 10, 0, Math.PI, true); ctx.fill(); break;
                        case "stonehenge": ctx.fillRect(screenX, y - 20, 8, 20); ctx.fillRect(screenX + 20, y - 25, 8, 25); ctx.fillRect(screenX + 40, y - 20, 8, 20); ctx.fillRect(screenX - 4, y - 25, 32, 5); ctx.fillRect(screenX + 16, y - 30, 32, 5); break;
                        case "machu_picchu": for (let i = 0; i < 5; i++) { ctx.fillRect(screenX + i * 10, y - i * 8 - 8, 60 - i * 10, 8); ctx.fillStyle = "#000"; ctx.fillRect(screenX + i * 10, y - i * 8 - 8, 60 - i * 10, 1); ctx.fillStyle = "#fff"; } ctx.beginPath(); ctx.moveTo(screenX + 20, y - 48); ctx.lineTo(screenX + 40, y - 90); ctx.lineTo(screenX + 60, y - 48); ctx.fill(); break;
                        case "mount_rushmore": ctx.beginPath(); ctx.moveTo(screenX, y); ctx.lineTo(screenX + 10, y - 40); ctx.lineTo(screenX + 50, y - 40); ctx.lineTo(screenX + 60, y); ctx.fill(); ctx.fillStyle = "#000"; ctx.fillRect(screenX + 12, y - 35, 4, 4); ctx.fillRect(screenX + 22, y - 35, 4, 4); ctx.fillRect(screenX + 32, y - 35, 4, 4); ctx.fillRect(screenX + 42, y - 35, 4, 4); break;
                        case "potala_palace": ctx.fillRect(screenX, y - 20, 80, 20); ctx.fillRect(screenX + 15, y - 40, 50, 20); ctx.fillRect(screenX + 30, y - 60, 20, 20); break;
                        case "victoria_falls": for (let i = 0; i < 40; i += 4) { ctx.fillRect(screenX + i, y - 20 + Math.random() * 5, 2, 20); ctx.fillRect(screenX + i, y - 25 - Math.random() * 10, 2, 2); } break;
                        case "uluru": ctx.beginPath(); ctx.moveTo(screenX, y); ctx.bezierCurveTo(screenX + 10, y - 30, screenX + 70, y - 30, screenX + 80, y); ctx.fill(); break;
                        case "sky_tower": ctx.fillRect(screenX + 10, y - 80, 2, 80); ctx.fillRect(screenX + 5, y - 60, 12, 10); ctx.fillRect(screenX + 7, y - 70, 8, 10); break;
                        case "antarctic_ice": ctx.fillRect(screenX, y - 15, 100, 15); ctx.fillStyle = "#000"; ctx.fillRect(screenX + 20, y - 15, 1, 10); ctx.fillRect(screenX + 60, y - 15, 2, 15); break;
                    }
                }
            });
        }

        let lastTime = 0;
        let elapsedGameSeconds = 0;

        function loop(timestamp = 0) {
            let deltaTime = lastTime ? (timestamp - lastTime) / 1000 : 0;
            if (deltaTime > 0.1) deltaTime = 0.1;
            lastTime = timestamp;

            const speedMult = getSpeedMultiplier();
            let currentL = landmarks[gameState.currentLandmarkIndex];
            let nextL = landmarks[gameState.nextLandmarkIndex];

            let dLng = nextL.lng - currentL.lng;
            if (dLng > 180) dLng -= 360;
            if (dLng < -180) dLng += 360;

            const mapDist = Math.hypot(dLng, nextL.lat - currentL.lat) / 360;
            const totalTripSeconds = mapDist * TOTAL_WORLD_TIME;
            const scrollPixelSpeed = BASE_SCROLL_SPEED * speedMult;

            if (gameState.state === 'waiting') {
                gameState.waitTimer -= deltaTime;
                if (gameState.waitTimer <= 0) {
                    let nextIndex;
                    do { nextIndex = Math.floor(Math.random() * landmarks.length); }
                    while (nextIndex === gameState.currentLandmarkIndex);

                    gameState.nextLandmarkIndex = nextIndex;
                    gameState.mapProgress = 0;
                    gameState.state = 'traveling';
                    gameState.departureVisualX = gameState.visualScrollX;
                    gameState.arrivalVisualX = null;
                }
            } else if (gameState.state === 'traveling') {
                gameState.visualScrollX += scrollPixelSpeed * deltaTime;

                if (totalTripSeconds === 0) {
                    gameState.mapProgress = 1;
                } else {
                    gameState.mapProgress += (deltaTime * speedMult) / totalTripSeconds;
                }

                let remainingRealSeconds = (1 - gameState.mapProgress) * totalTripSeconds / speedMult;
                if (remainingRealSeconds <= 4.0 && !gameState.arrivalVisualX) {
                    gameState.arrivalVisualX = gameState.visualScrollX + (scrollPixelSpeed * remainingRealSeconds) - 40;
                }

                if (gameState.mapProgress >= 1) {
                    gameState.mapProgress = 1;
                    gameState.currentLandmarkIndex = gameState.nextLandmarkIndex;
                    gameState.state = 'waiting';
                    gameState.waitTimer = 2.0;
                    if (gameState.arrivalVisualX) {
                        gameState.visualScrollX = gameState.arrivalVisualX - catX - 40;
                    }
                }
            }

            if (gameState.state === 'waiting') {
                gameState.currentLat = currentL.lat;
                gameState.currentLng = currentL.lng;
            } else {
                gameState.currentLat = currentL.lat + (nextL.lat - currentL.lat) * gameState.mapProgress;
                gameState.currentLng = currentL.lng + dLng * gameState.mapProgress;
            }

            let displayLng = ((gameState.currentLng + 180) % 360 + 360) % 360 - 180;

            catMarker.setLatLng([gameState.currentLat, displayLng]);
            map.panTo([gameState.currentLat, displayLng], { animate: true, duration: 0.5 });


            // 新しい海陸自動判定 (100%正確な白マップ読み取り方式)
            const realSeaState = getSeaStateRealtime(gameState.currentLat, displayLng);
            const realBgType = gameState.mapProgress > 0.5 ? nextL.bgType : currentL.bgType;

            if (gameState.state === 'waiting') {
                gameState.currentSeaState = realSeaState;
                gameState.currentBgType = realBgType;
            } else {
                if (gameState.boundaryVisualX === null &&
                    (gameState.currentSeaState !== realSeaState || gameState.currentBgType !== realBgType)) {
                    gameState.upcomingSeaState = realSeaState;
                    gameState.upcomingBgType = realBgType;
                    gameState.boundaryVisualX = gameState.visualScrollX + canvas.width + 20;
                }
            }

            let currentBoundaryScreenX = null;
            if (gameState.boundaryVisualX != null) {
                currentBoundaryScreenX = gameState.boundaryVisualX - gameState.visualScrollX + catX;
                if (currentBoundaryScreenX < -40) {
                    gameState.currentSeaState = gameState.upcomingSeaState;
                    gameState.currentBgType = gameState.upcomingBgType;
                    gameState.boundaryVisualX = null;
                    currentBoundaryScreenX = null;
                }
            }

            let catIsSea = (currentBoundaryScreenX != null && catX >= currentBoundaryScreenX) ? gameState.upcomingSeaState : gameState.currentSeaState;

            elapsedGameSeconds += deltaTime * speedMult;
            const dayProgress = (elapsedGameSeconds % 86400) / 86400;
            drawSky(dayProgress, gameState.visualScrollX);

            drawEnvironment(gameState.visualScrollX, currentBoundaryScreenX, gameState.currentSeaState, gameState.upcomingSeaState, gameState.currentBgType, gameState.upcomingBgType);

            let activeLandmarksToDraw = [];
            if (gameState.state === 'waiting') {
                activeLandmarksToDraw.push({ ...currentL, targetVisualX: gameState.visualScrollX + catX + 40 });
            } else {
                activeLandmarksToDraw.push({ ...currentL, targetVisualX: gameState.departureVisualX + catX + 40 });
                if (gameState.arrivalVisualX) {
                    activeLandmarksToDraw.push({ ...nextL, targetVisualX: gameState.arrivalVisualX });
                }
            }
            drawLandmarks(gameState.visualScrollX, activeLandmarksToDraw);

            targetDisplay.textContent = gameState.state === 'waiting' ? `Arrived: ${currentL.name}` : `Destination: ${nextL.name}`;
            timeDisplay.textContent = `Environment: ${catIsSea ? 'Ocean' : 'Land'}`;

            if (catIsSea) {
                drawSprite(catSwimmingFrame, catX, groundY + 12);
            } else {
                if (gameState.state === 'waiting') {
                    drawSprite(catFrames[0], catX, groundY - 14);
                } else {
                    let animationInterval = Math.max(50, 300 / Math.sqrt(speedMult));
                    let frame = Math.floor(timestamp / animationInterval) % 2;
                    drawSprite(catFrames[frame], catX, groundY - 14);
                }
            }

            requestAnimationFrame(loop);
        }

        requestAnimationFrame(loop);
    </script>
